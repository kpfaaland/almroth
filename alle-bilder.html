<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <title>Alle bilder – Almroth Entreprenør</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <nav class="nav-inner">
    <a href="index.html" class="logo-link">
      <img src="images/logo.png" alt="Almroth Entreprenør" class="logo" />
    </a>
    <button class="nav-toggle" aria-label="Åpne meny" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Forside</a></li>
      <li><a href="index.html#tjenester">Tjenester</a></li>
      <li><a href="index.html#om-oss">Om oss</a></li>
      <li><a href="index.html#prosjekter">Prosjekter</a></li>
      <li><a href="index.html#kontakt">Kontakt</a></li>
    </ul>
  </nav>
</header>

<div class="page-hero">
  <div class="page-hero-inner">
    <a href="index.html#prosjekter" class="page-back">← Tilbake til prosjekter</a>
    <h1>Alle prosjekter og bilder</h1>
    <p id="total-count"></p>
  </div>
</div>

<section class="section">
  <div class="container" id="all-projects-container"></div>
</section>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Bildegalleri">
  <button class="lightbox-close" id="lb-close" aria-label="Lukk">&times;</button>
  <button class="lightbox-prev" id="lb-prev" aria-label="Forrige">&#8592;</button>
  <button class="lightbox-next" id="lb-next" aria-label="Neste">&#8594;</button>
  <div class="lightbox-img-wrap">
    <img src="" alt="" id="lb-img" />
  </div>
  <p class="lightbox-counter" id="lb-counter"></p>
</div>

<footer class="footer">
  <div class="container">
    <p>&copy; <span id="year"></span> &middot; Ivar Almroth Transport og Graving AS &middot; Orgnummer 941 675 417</p>
  </div>
</footer>

<script src="main.js"></script>
<script>
  // Flat liste over alle bilder på tvers av prosjekter
  let flatImages = []; // { src, alt }
  let currentIndex = 0;

  const lightbox  = document.getElementById('lightbox');
  const lbImg     = document.getElementById('lb-img');
  const lbCounter = document.getElementById('lb-counter');

  async function loadAll() {
    const res  = await fetch('projects.json');
    const data = await res.json();
    const container = document.getElementById('all-projects-container');

    data.projects.filter(p => p.images && p.images.length > 0).forEach(project => {
      // Legg til alle prosjektbilder i flattelisten og noter startindeks
      const startIndex = flatImages.length;
      project.images.forEach(img => {
        flatImages.push({
          src: `images/${project.id}/${img}`,
          alt: `${project.name}`
        });
      });

      // Prosjektoverskrift
      const heading = document.createElement('h3');
      heading.style.cssText = 'font-size:1.1rem; font-weight:600; margin: 2rem 0 0.75rem; color: var(--color-text-primary, #1a1a1a);';
      heading.textContent = project.name;
      container.appendChild(heading);

      // Bilderutenett
      const grid = document.createElement('div');
      grid.className = 'all-gallery-grid';

      project.images.forEach((img, i) => {
        const flatIdx = startIndex + i;
        const item = document.createElement('div');
        item.className = 'gallery-item';
        const image = document.createElement('img');
        image.src = `images/${project.id}/${img}`;
        image.alt = `${project.name} – bilde ${i + 1}`;
        image.loading = 'lazy';
        item.appendChild(image);
        item.addEventListener('click', () => openLightbox(flatIdx));
        grid.appendChild(item);
      });

      container.appendChild(grid);
    });

    document.getElementById('total-count').textContent = flatImages.length + ' bilder totalt';
  }

  function openLightbox(index) {
    currentIndex = index;
    showImage(currentIndex);
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  function showImage(index) {
    lbImg.src = flatImages[index].src;
    lbImg.alt = flatImages[index].alt;
    lbCounter.textContent = (index + 1) + ' / ' + flatImages.length;
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + flatImages.length) % flatImages.length;
    showImage(currentIndex);
  });
  document.getElementById('lb-next').addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % flatImages.length;
    showImage(currentIndex);
  });
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') { currentIndex = (currentIndex - 1 + flatImages.length) % flatImages.length; showImage(currentIndex); }
    if (e.key === 'ArrowRight') { currentIndex = (currentIndex + 1) % flatImages.length; showImage(currentIndex); }
  });

  document.getElementById('year').textContent = new Date().getFullYear();
  loadAll();
</script>
</body>
</html>
